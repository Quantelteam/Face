kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "bash -c 'export PATH=/home/runner/workspace/.pythonlibs/bin:$PATH && export PYTHONPATH=/home/runner/workspace/artifacts/api-server && cd /home/runner/workspace/artifacts/api-server && uvicorn main:app --host 0.0.0.0 --port ${PORT:-8080} --reload'"

[services.production]

[services.production.build]
args = ["bash", "-c", "true"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["bash", "-c", "export PATH=/home/runner/workspace/.pythonlibs/bin:$PATH && export PYTHONPATH=/home/runner/workspace/artifacts/api-server && cd /home/runner/workspace/artifacts/api-server && uvicorn main:app --host 0.0.0.0 --port 8080"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
