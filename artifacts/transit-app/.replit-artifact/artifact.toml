kind = "web"
previewPath = "/"
title = "FacePay Transit"
version = "1.0.0"
id = "artifacts/transit-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22373

[services.development]
run = "pnpm --filter @workspace/transit-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/transit-app", "run", "build" ]
publicDir = "artifacts/transit-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22373"
BASE_PATH = "/"
